spring.application.name=registroReceitas
server.port=80

# --- Configuracao do Banco de Dados ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/registro_receitas_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

# Ajuda o Hibernate (JPA) a "conversar" com o PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configura o servidor de envio de e-mail
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:""}
spring.mail.password=${EMAIL_PASSWORD:""}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true

# Configura o arquivo de logs
logging.file.name=logs/receitas-app.log

# Configuracoes do Token JWT
security.jwt.secret-key=${JWT_SECRET_KEY:""}
# 1h in millisecond
security.jwt.expiration-time=3600000
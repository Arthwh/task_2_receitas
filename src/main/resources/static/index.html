<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Receitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<div id="app" v-cloak>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Sistema de Receitas</a>
            <div v-if="isLoggedIn" class="d-flex">
                <button class="btn text-white form-control me-2" @click="showModal('editUserModal')">
                    <i class="bi bi-person"></i> {{ userLogin }}
                </button>
                <button class="btn btn-danger" @click="logout">Sair</button>
            </div>
        </div>
    </nav>

    <div class="container-sm mt-5">
        <div v-if="!isLoggedIn" class="auth-card">
            <input v-model="authForm.login" placeholder="Login" class="form-control mb-2">
            <input v-model="authForm.senha" type="password" placeholder="Senha" class="form-control mb-2">
            <button @click="login" class="btn btn-primary-custom w-100 mt-2">Entrar</button>
            <button @click="showModal('createUserModal')" class="btn btn-secondary-custom w-100 mt-2">Criar conta</button>
        </div>

        <div v-else>
            <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded-4 shadow-sm">
                <h2 class="fw-bold mb-0">Receitas</h2>

                <div class="d-flex gap-2 align-items-center">
                    <button class="btn btn-primary-custom" @click="showModal('recipeModal')">
                        <i class="bi bi-plus-lg me-1"></i> Nova Receita
                    </button>

                    <div class="dropdown">
                        <button class="btn btn-secondary-custom dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
                            <i class="bi bi-filter-right me-1"></i> Filtros & Opções
                        </button>

                        <div class="dropdown-menu dropdown-menu-end p-4 shadow-lg border-0" style="min-width: 300px; border-radius: 15px;">
                            <h6 class="dropdown-header px-0 mb-3 text-dark fw-bold">Filtrar Listagem</h6>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Tipo de Receita</label>
                                <select v-model="filtroTipo" class="form-select form-select-sm border-light bg-light">
                                    <option value="">Todos os tipos</option>
                                    <option value="SALGADO">Salgado</option>
                                    <option value="DOCE">Doce</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">A partir da data</label>
                                <input type="date" v-model="filtroData" class="form-control form-control-sm border-light bg-light">
                            </div>

                            <div class="d-grid mt-3">
                                <button class="btn btn-primary-custom btn-sm" @click="loadRecipes">
                                    <i class="bi bi-file-earmark-pdf-fill me-1"></i> Aplicar Filtros
                                </button>
                            </div>

                            <hr class="dropdown-divider">

                            <div class="d-grid mt-3">
                                <button class="btn btn-outline-danger btn-sm" @click="exportPdf">
                                    <i class="bi bi-file-earmark-pdf-fill me-1"></i> Exportar Resultados (PDF)
                                </button>
                            </div>

                            <div class="text-center mt-2">
                                <a href="#" class="text-decoration-none small text-secondary" @click.prevent="clearFilters">Limpar filtros</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-4" v-for="r in receitas" :key="r.id">
                    <div class="card h-100 recipe-card shadow-sm">
                        <div class="card-body">
                            <span :class="['badge mb-2', r.tipoReceita === 'DOCE' ? 'bg-danger' : 'bg-primary']">
                                {{ r.tipoReceita }}
                            </span>
                            <h5 class="card-title">{{ r.nome }}</h5>
                            <p class="text-muted small">{{ r.descricao }}</p>
                            <div class="d-flex justify-content-between">
                                <span class="fw-bold">R$ {{ r.custo.toFixed(2) }}</span>
                                <small class="text-secondary">{{ formatDate(r.dataRegistro) }}</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label>Id</label><input v-model="userForm.id" class="form-control" :disabled="true"></div>
                    <div class="mb-3"><label>Nome</label><input v-model="userForm.nome" class="form-control"></div>
                    <div class="mb-3"><label>Login</label><input v-model="userForm.login" class="form-control" :disabled="true"></div>
                    <div class="mb-3"><label>Senha</label><input v-model="userForm.senha" type="password" class="form-control"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary-custom w-100" @click="updateUser">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cadastro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label>Nome</label><input v-model="userForm.nome" class="form-control"></div>
                    <div class="mb-3"><label>Login</label><input v-model="userForm.login" class="form-control"></div>
                    <div class="mb-3"><label>Senha</label><input v-model="userForm.senha" type="password" class="form-control"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary-custom w-100" @click="createUser">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="recipeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cadastro de Receita</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input v-model="recipeForm.nome" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea v-model="recipeForm.descricao" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">Custo (R$)</label>
                            <input v-model="recipeForm.custo" type="number" step="0.01" class="form-control"></div>
                        <div class="col-6">
                            <label class="form-label">Tipo</label>
                            <select v-model="recipeForm.tipoReceita" class="form-select">
                                <option value="SALGADO">Salgado</option>
                                <option value="DOCE">Doce</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary-custom w-100" @click="saveRecipe">Salvar Receita</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
